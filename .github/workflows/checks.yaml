name: Check

on:
  pull_request:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://placeholder:placeholder@localhost:5432/placeholder' }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'insecure-ci-secret-that-is-long-enough-32chars' }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'placeholder.apps.googleusercontent.com' }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'placeholder' }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'placeholder' }}
  OPENROUTER_MODEL: deepseek/deepseek-v4-flash
  VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'placeholder' }}
  VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'placeholder' }}
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || 'placeholder' }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install Dependencies
        run: bun install

      - name: Check Formatting
        run: bunx --bun prettier --check .

      - name: Run Linter
        run: bun lint

      - name: Check TypeScript Types
        run: bunx --bun tsc --noEmit

      - name: Validate AGENTS.md Freshness
        run: bun run validate:agents-md

      - name: Run Tests with Coverage
        run: bun run test:coverage

      - name: Verify Production Build
        run: bun run build

  quality-tools:
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install Dependencies
        run: bun install

      - name: Dead Code Detection (knip)
        run: bun run knip

      - name: Duplicate Code Detection (jscpd)
        run: bun run jscpd

      - name: TODO/FIXME Scanner
        run: bun run check:todos

      - name: Automated Docs Check
        run: bun run docs:check
