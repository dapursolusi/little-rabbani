name: E2E Tests

on:
  pull_request:
    branches: [main]

env:
  # Required for next dev (env.mjs validates at import) — use secrets or placeholders.
  # Non-secret defaults here; sensitive values from repo secrets.
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://placeholder:placeholder@localhost:5432/placeholder' }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'insecure-ci-secret-that-is-long-enough-32chars' }}
  BETTER_AUTH_URL: http://localhost:3000
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'placeholder.apps.googleusercontent.com' }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'placeholder' }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'placeholder' }}
  OPENROUTER_MODEL: deepseek/deepseek-v4-flash
  VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'placeholder' }}
  VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'placeholder' }}
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || 'placeholder' }}

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: Preview
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install Dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: bun run test:e2e

      - name: Upload Playwright Report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
